<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0d0905">
<title>404 — HIVEMIND</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
  :root{ --comb:#0d0905; --text:#f7eed9; --dim:#c2a97e; --gold:#ffd97a; --honey:#ffb42b; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ min-height:100vh; background:var(--comb); color:var(--text);
    font-family:'Bricolage Grotesque',sans-serif; -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px; }
  .bee{ font-size:52px; margin-bottom:18px; }
  h1{ font-weight:800; font-size:40px; letter-spacing:.06em; margin-bottom:10px;
    background:linear-gradient(95deg,var(--gold),#fff 55%,var(--honey)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  p{ font-size:14px; color:var(--dim); margin-bottom:28px; max-width:420px; line-height:1.7; }
  a.play{ display:inline-block; padding:13px 28px; border-radius:999px; text-decoration:none;
    font-weight:700; font-size:15px; color:#241503; background:linear-gradient(180deg,var(--gold),var(--honey));
    box-shadow:0 8px 22px rgba(255,160,40,.28); }
</style>
</head>
<body>
  <div class="bee">🐝</div>
  <h1>404</h1>
  <p>This forager came home with an empty pollen basket — there's no page at this address. The hive, though, is right where you left it.</p>
  <a class="play" href="/">Back to the hive ▶</a>
</body>
</html>
